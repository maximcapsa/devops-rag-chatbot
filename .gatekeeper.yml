# GateKeeper policy for devops-rag-chatbot.
# Read at PR time by the GateKeeper GitHub App. Omitted keys use the defaults below.

# Open issues at these severities block the merge.
blocking_severities: [BLOCKER, CRITICAL]

# Any open vulnerability fails the gate regardless of severity.
fail_on_vulnerability: true

# Security hotspots need human review, not a hard block.
fail_on_security_hotspot: false

# false = advisory only (a failed gate posts a neutral check instead of blocking).
enforce: true

# Findings in these globs are excluded entirely (tests + sample data).
ignore_paths:
  - "tests/**"
  - "data/**"
